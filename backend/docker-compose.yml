name: event-planner-api

services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DB_HOST: ${DOCKER_DB_HOST:-host.docker.internal}
    networks:
      - event-planner-network

  mysql:
    image: mysql:8
    profiles:
      - docker-db
    environment:
      MYSQL_DATABASE: ${DB_NAME:-event_planner_db}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/docs/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - event-planner-network

volumes:
  mysql_data:

networks:
  event-planner-network:
