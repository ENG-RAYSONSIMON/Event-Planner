name: event-planner-api

services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      DB_HOST: ${DOCKER_DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
    networks:
      - event-planner-network

  postgres:
    image: postgres:16
    profiles:
      - docker-db
    environment:
      POSTGRES_DB: ${DB_NAME:-event_planner}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/docs/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - event-planner-network

volumes:
  postgres_data:

networks:
  event-planner-network:
